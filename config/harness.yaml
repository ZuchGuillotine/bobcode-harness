harness:
  name: agent-harness
  version: "1.0.0"
  data_dir: data
  log_dir: logs
  secrets_dir: secrets

orchestrator:
  max_concurrent_tasks: 5
  default_budget:
    max_tokens: 500000
    max_cost_usd: 5.00
    max_duration_minutes: 30
    max_retries: 3

stage_manager:
  worktree_base: data/worktrees
  tmux_prefix: harness

tracing:
  phoenix_port: 6006
  export_dir: data/traces

notifications:
  telegram:
    enabled: true
    allowed_chat_ids: []  # Configure with authorized Telegram chat IDs
    polling_interval: 1

community_feedback:
  consent: local_only
  export_dir: data/community/exports
  state_file: data/community/export_state.json

database:
  sqlite_path: data/sqlite/harness.db
  kuzu_path: data/kuzu
