# MCP Marketing Server Configuration
# Defines connections to marketing platform APIs via MCP servers

mcp_servers:
  google_ads:
    name: google-ads-mcp
    transport: stdio
    command: npx
    args: ["-y", "@anthropic/mcp-google-ads"]
    env:
      GOOGLE_ADS_DEVELOPER_TOKEN: "${GOOGLE_ADS_DEVELOPER_TOKEN}"
      GOOGLE_ADS_CLIENT_ID: "${GOOGLE_ADS_CLIENT_ID}"
      GOOGLE_ADS_CLIENT_SECRET: "${GOOGLE_ADS_CLIENT_SECRET}"
      GOOGLE_ADS_REFRESH_TOKEN: "${GOOGLE_ADS_REFRESH_TOKEN}"
      GOOGLE_ADS_CUSTOMER_ID: "${GOOGLE_ADS_CUSTOMER_ID}"
    capabilities:
      - campaign_management
      - ad_group_management
      - keyword_management
      - performance_reporting
      - budget_management

  google_analytics_4:
    name: ga4-mcp
    transport: stdio
    command: npx
    args: ["-y", "@anthropic/mcp-ga4"]
    env:
      GA4_PROPERTY_ID: "${GA4_PROPERTY_ID}"
      GOOGLE_SERVICE_ACCOUNT_KEY: "${GOOGLE_SERVICE_ACCOUNT_KEY}"
    capabilities:
      - realtime_reporting
      - audience_insights
      - conversion_tracking
      - event_analysis
      - user_flow_analysis

  google_search_console:
    name: gsc-mcp
    transport: stdio
    command: npx
    args: ["-y", "@anthropic/mcp-gsc"]
    env:
      GSC_SITE_URL: "${GSC_SITE_URL}"
      GOOGLE_SERVICE_ACCOUNT_KEY: "${GOOGLE_SERVICE_ACCOUNT_KEY}"
    capabilities:
      - search_performance
      - index_coverage
      - url_inspection
      - sitemap_management
      - keyword_ranking

  twitter_x:
    name: twitter-mcp
    transport: stdio
    command: npx
    args: ["-y", "@anthropic/mcp-twitter"]
    env:
      TWITTER_API_KEY: "${TWITTER_API_KEY}"
      TWITTER_API_SECRET: "${TWITTER_API_SECRET}"
      TWITTER_ACCESS_TOKEN: "${TWITTER_ACCESS_TOKEN}"
      TWITTER_ACCESS_TOKEN_SECRET: "${TWITTER_ACCESS_TOKEN_SECRET}"
      TWITTER_BEARER_TOKEN: "${TWITTER_BEARER_TOKEN}"
    capabilities:
      - post_tweets
      - schedule_tweets
      - engagement_analytics
      - audience_insights
      - trend_monitoring

  linkedin:
    name: linkedin-mcp
    transport: stdio
    command: npx
    args: ["-y", "@anthropic/mcp-linkedin"]
    env:
      LINKEDIN_CLIENT_ID: "${LINKEDIN_CLIENT_ID}"
      LINKEDIN_CLIENT_SECRET: "${LINKEDIN_CLIENT_SECRET}"
      LINKEDIN_ACCESS_TOKEN: "${LINKEDIN_ACCESS_TOKEN}"
      LINKEDIN_ORGANIZATION_ID: "${LINKEDIN_ORGANIZATION_ID}"
    capabilities:
      - post_content
      - company_page_management
      - campaign_management
      - analytics_reporting
      - audience_targeting

# Global MCP settings
mcp_settings:
  connection_timeout_seconds: 30
  request_timeout_seconds: 60
  max_retries: 3
  retry_delay_seconds: 5
  log_requests: true
  rate_limiting:
    google_ads:
      requests_per_minute: 60
    ga4:
      requests_per_minute: 120
    gsc:
      requests_per_minute: 60
    twitter_x:
      requests_per_minute: 30
    linkedin:
      requests_per_minute: 30
