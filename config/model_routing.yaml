default_provider: anthropic

# -----------------------------------------------------------------------
# Pipeline: planner (Opus) → worker (Qwen) → initial_reviewer (GPT-5.4)
#         → worker_fix (Qwen) → final_reviewer (Opus, read-only)
# -----------------------------------------------------------------------

routing:
  planner:
    model: anthropic/claude-opus-4-6
    fallback: openai/gpt-5.4
    max_tokens: 8000
    temperature: 0.3
    note: "Planner via Claude Code CLI (Max subscription, no API cost)."

  worker:
    model: openrouter/qwen/qwen3.5-397b-a17b
    fallback: anthropic/claude-sonnet-4-6
    max_tokens: 16000
    temperature: 0.2
    note: "Qwen 3.5 flagship — 10-17x cheaper than Sonnet. Falls back to Sonnet if OpenRouter is down."

  initial_reviewer:
    model: openai/gpt-5.4
    fallback: openai/gpt-5.4-mini
    max_tokens: 4000
    temperature: 0.1
    note: "GPT-5.4 first-pass review — catches issues before fix cycle."

  worker_fix:
    model: openrouter/qwen/qwen3.5-397b-a17b
    fallback: anthropic/claude-sonnet-4-6
    max_tokens: 16000
    temperature: 0.2
    note: "Qwen applies fixes based on initial review feedback."

  final_reviewer:
    model: anthropic/claude-opus-4-6
    fallback: openai/gpt-5.4
    max_tokens: 4000
    temperature: 0.0
    note: "Opus final pass — READ-ONLY, prints issues only, no agent actions. Zero temp for determinism."

  content_generation:
    model: openrouter/qwen/qwen3.5-397b-a17b
    fallback: anthropic/claude-sonnet-4-6
    max_tokens: 8000
    temperature: 0.7
    note: "Marketing content — higher temp for creativity."

  eval_judge:
    model: openai/gpt-5.4-mini
    max_tokens: 2000
    temperature: 0.0
    note: "Evals need determinism. Zero temp, cheapest option."

  lightweight:
    model: openai/gpt-5.4-mini
    max_tokens: 4000
    temperature: 0.1
    note: "Classification, formatting, parsing. Cheapest option."

cost_tracking:
  enabled: true
  alert_threshold_daily_usd: 50.00
  kill_threshold_daily_usd: 100.00
